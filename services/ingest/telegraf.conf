# Ingest: subscribe MQTT, write to TimescaleDB.
# Uses Influx Line Protocol (matches what gateway publishes).

[agent]
  interval = "10s"           # internal agent tick; MQTT input is event-driven
  round_interval = true
  flush_interval = "5s"
  flush_jitter = "1s"
  omit_hostname = true

# ========== INPUT: MQTT ==========
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["ems/devices/+/measurements"]
  data_format = "influx"
  client_id = "ems-ingest"
  qos = 1

# ========== OUTPUT: PostgreSQL / TimescaleDB ==========
[[outputs.postgresql]]
  connection = "host=timescaledb user=postgres password=${POSTGRES_PASSWORD} sslmode=disable dbname=ems"
  schema = "public"
  tags_as_jsonb = false
  fields_as_jsonb = false
  # time column is already called "time" by default in Telegraf's postgresql output.

  # We pre-created the 'electricity_measurements' hypertable in init.sql with the exact columns
  # we expect. Don't let Telegraf auto-create tables.
  create_templates = []
