# KC Ingest: subscribe factory MQTT data and write it to TimescaleDB.

[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "5s"
  flush_jitter = "1s"
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["ems/factory/+/measurements"]
  data_format = "influx"
  client_id = "kc-ingest-plc"
  qos = 1

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["factory/sensor/temp_01"]
  data_format = "json_v2"
  client_id = "kc-ingest-sensor"
  qos = 1
  tagexclude = ["topic", "name", "slave_id", "type"]

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "factory_measurements"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temp"
      rename = "temperature"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "hum"
      rename = "humidity"
      type = "float"

  [inputs.mqtt_consumer.tags]
    device_id = "sensor-001"
    device_type = "sensor"

[[outputs.postgresql]]
  connection = "host=timescaledb user=postgres password=${POSTGRES_PASSWORD} sslmode=disable dbname=ems"
  schema = "public"
  tags_as_jsonb = false
  fields_as_jsonb = false
  create_templates = []
