# Gateway: read Modbus from simulator, publish to MQTT.
# Uses Telegraf's "request" configuration style (newer, clearer, handles FLOAT32
# decoding correctly). Between Telegraf instances we use Influx Line Protocol.

[agent]
  interval = "1s"
  round_interval = true
  flush_interval = "1s"
  flush_jitter = "0s"
  omit_hostname = true

# ========== INPUT: Modbus TCP (our simulator) ==========
[[inputs.modbus]]
  name = "sim-001"                 # required: device identifier in logs
  name_override = "electricity_measurements"   # becomes the table name in TimescaleDB
  slave_id = 1
  timeout = "1s"
  controller = "tcp://simulator:5020"
  configuration_type = "request"   # use the newer config style

[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "ABCD"
  register = "holding"
  fields = [
    { address = 0, name = "voltage",    type = "INT16",   output = "FLOAT64", scale = 0.1 },
    { address = 1, name = "current",    type = "INT16",   output = "FLOAT64", scale = 0.1 },
    { address = 2, name = "power_kw",   type = "FLOAT32", output = "FLOAT64" },
    { address = 4, name = "energy_kwh", type = "FLOAT32", output = "FLOAT64" },
  ]
  tags = { device_id = "sim-001" }

# ========== OUTPUT: MQTT ==========
[[outputs.mqtt]]
  servers = ["tcp://mosquitto:1883"]
  topic = 'ems/devices/{{ .Tag "device_id" }}/measurements'
  data_format = "influx"
  client_id = "ems-gateway"
  qos = 1
  keep_alive = 30
