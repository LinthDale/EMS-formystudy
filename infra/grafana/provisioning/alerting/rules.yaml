apiVersion: 1

groups:
  # ============================================================
  # Group 1: 業務告警 (功率超限)
  # noData/execErr 設為 OK，避免管線中斷時誤觸
  # ============================================================
  - orgId: 1
    name: EMS-功率告警
    folder: EMS
    interval: 1m
    rules:
      - uid: ems-power-kw-high
        title: "功率超限 (power_kw > 100 kW)"
        condition: C
        data:
          # A: 查過去 5 分鐘的 power_kw 時序
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: time_series
              rawQuery: true
              rawSql: |
                SELECT
                  time,
                  power_kw
                FROM electricity_measurements
                WHERE time >= now() - interval '5 minutes'
                  AND power_kw < 1000
                ORDER BY time
              refId: A
          # B: Reduce → 取平均值
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: mean
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          # C: Threshold → 平均 > 100 kW 就告警
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 100
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        execErrState: OK
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "功率超過 100 kW"
          description: "過去 1 分鐘平均 power_kw 超過 100 kW，請確認現場狀況"
        isPaused: false
        notification_settings:
          receiver: Telegram

  # ============================================================
  # Group 2: 管線健康告警 (資料寫入停滯)
  # 監控兩條 ingest 鏈路 (electricity + factory) 是否還在寫入
  # 這裡 noData/execErr 設為 Alerting，因為「沒資料 = 真的有問題」
  # ============================================================
  - orgId: 1
    name: EMS-管線健康
    folder: EMS
    interval: 1m
    rules:
      # ----- 電表 ingest 停滯 -----
      - uid: ems-pipeline-electricity-stale
        title: "電表資料寫入停滯 (>2 分鐘無新資料)"
        condition: C
        data:
          # A: 查過去 2 分鐘有幾筆 electricity_measurements
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT
                  COUNT(*)::float8 AS row_count
                FROM electricity_measurements
                WHERE time > now() - interval '2 minutes'
              refId: A
          # B: Reduce → last value
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          # C: Threshold → row_count < 1 就告警
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: Alerting    # 沒資料 = 真的壞了，要告警
        execErrState: Alerting   # SQL 錯誤 = 真的壞了，要告警
        for: 1m
        labels:
          severity: critical
          component: pipeline
        annotations:
          summary: "電表資料寫入停滯"
          description: "過去 2 分鐘沒有新的 electricity_measurements 寫入。請檢查 ems-simulator / ems-gateway / ems-ingest / mosquitto / timescaledb"
        isPaused: false
        notification_settings:
          receiver: Telegram

      # ----- 工廠 ingest 停滯 -----
      - uid: ems-pipeline-factory-stale
        title: "工廠資料寫入停滯 (>2 分鐘無新資料)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT
                  COUNT(*)::float8 AS row_count
                FROM factory_measurements
                WHERE time > now() - interval '2 minutes'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        labels:
          severity: critical
          component: pipeline
        annotations:
          summary: "工廠資料寫入停滯"
          description: "過去 2 分鐘沒有新的 factory_measurements 寫入。請檢查 kc-modbus-sim / kc-mqtt-sim / kc-gateway / kc-ingest / mosquitto / timescaledb"
        isPaused: false
        notification_settings:
          receiver: Telegram

  # ============================================================
  # Group 3: 設備分類安全告警 (PRD-0003 device_audit_log)
  # 來源 = device_audit_log rows (audit Slice A-C2)。低基數設計：用 SQL
  # GROUP BY ... HAVING 算出「跨閾值的 device/key 數量」當單一指標，device_id /
  # actor_key_id 不進 Prometheus label。noData/execErr = OK：沒有 audit row 或
  # 查詢暫時失敗都不應誤觸安全告警。
  # ============================================================
  - orgId: 1
    name: EMS-設備分類安全
    folder: EMS
    interval: 1m
    rules:
      # ----- FR-339：L2 guardrail 連續 BLOCK 同 device / 1h ≥ 5 -----
      - uid: ems-guardrail-block-burst
        title: "L2 guardrail BLOCK 爆量 (同 device 1h ≥ 5 次)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS offending_devices FROM (
                  SELECT device_id
                  FROM public.device_audit_log
                  WHERE event_type = 'guardrail_block'
                    AND event_time > now() - interval '1 hour'
                  GROUP BY device_id
                  HAVING count(*) >= 5
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        # 安全告警：查詢執行失敗時進 Error 狀態（會通知），避免壞查詢靜默失效；
        # 空表/平靜期則維持 OK（沒有 audit row 不該誤觸）。
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          component: device-classification
        annotations:
          summary: "L2 guardrail 連續 BLOCK (FR-339)"
          description: "過去 1 小時內有 device 的 L2 guardrail BLOCK ≥ 5 次，可能正被持續 prompt-injection 攻擊。查 SELECT device_id, count(*) FROM device_audit_log WHERE event_type='guardrail_block' AND event_time>now()-interval '1 hour' GROUP BY device_id HAVING count(*)>=5。"
        isPaused: false
        notification_settings:
          receiver: Telegram

      # ----- FR-344：大量 deactivate 同 key / 1h ≥ 5 -----
      - uid: ems-mass-deactivate-1h
        title: "大量 deactivate (同 key 1h ≥ 5)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS offending_keys FROM (
                  SELECT actor_key_id
                  FROM public.device_audit_log
                  WHERE event_type = 'deactivate'
                    AND actor_key_id IS NOT NULL
                    AND event_time > now() - interval '1 hour'
                  GROUP BY actor_key_id
                  HAVING count(*) >= 5
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        # 安全告警：查詢執行失敗時進 Error 狀態（會通知），避免壞查詢靜默失效；
        # 空表/平靜期則維持 OK（沒有 audit row 不該誤觸）。
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          component: device-corrections
        annotations:
          summary: "大量 deactivate / 1h (FR-344)"
          description: "過去 1 小時內有 OPS key 將 ≥ 5 筆 corrections 標為 deactivate，可能是 correction 毒化/竄改。查 device_audit_log event_type='deactivate' GROUP BY actor_key_id。"
        isPaused: false
        notification_settings:
          receiver: Telegram

      # ----- FR-344：大量 deactivate 同 key / 24h ≥ 20 -----
      - uid: ems-mass-deactivate-24h
        title: "大量 deactivate (同 key 24h ≥ 20)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS offending_keys FROM (
                  SELECT actor_key_id
                  FROM public.device_audit_log
                  WHERE event_type = 'deactivate'
                    AND actor_key_id IS NOT NULL
                    AND event_time > now() - interval '24 hours'
                  GROUP BY actor_key_id
                  HAVING count(*) >= 20
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        # 安全告警：查詢執行失敗時進 Error 狀態（會通知），避免壞查詢靜默失效；
        # 空表/平靜期則維持 OK（沒有 audit row 不該誤觸）。
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          component: device-corrections
        annotations:
          summary: "大量 deactivate / 24h (FR-344)"
          description: "過去 24 小時內有 OPS key 將 ≥ 20 筆 corrections 標為 deactivate。查 device_audit_log event_type='deactivate' GROUP BY actor_key_id。"
        isPaused: false
        notification_settings:
          receiver: Telegram
