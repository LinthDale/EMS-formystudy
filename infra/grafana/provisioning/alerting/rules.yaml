apiVersion: 1

groups:
  # ============================================================
  # Group 1: 業務告警 (功率超限)
  # noData/execErr 設為 OK，避免管線中斷時誤觸
  # ============================================================
  - orgId: 1
    name: EMS-功率告警
    folder: EMS
    interval: 1m
    rules:
      - uid: ems-power-kw-high
        title: "功率超限 (power_kw > 100 kW)"
        condition: C
        data:
          # A: 查過去 5 分鐘的 power_kw 時序
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: time_series
              rawQuery: true
              rawSql: |
                SELECT
                  time,
                  power_kw
                FROM electricity_measurements
                WHERE time >= now() - interval '5 minutes'
                  AND power_kw < 1000
                ORDER BY time
              refId: A
          # B: Reduce → 取平均值
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: mean
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          # C: Threshold → 平均 > 100 kW 就告警
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 100
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        execErrState: OK
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "功率超過 100 kW"
          description: "過去 1 分鐘平均 power_kw 超過 100 kW，請確認現場狀況"
        isPaused: false
        notification_settings:
          receiver: Telegram

  # ============================================================
  # Group 2: 管線健康告警 (資料寫入停滯)
  # 監控兩條 ingest 鏈路 (electricity + factory) 是否還在寫入
  # 這裡 noData/execErr 設為 Alerting，因為「沒資料 = 真的有問題」
  # ============================================================
  - orgId: 1
    name: EMS-管線健康
    folder: EMS
    interval: 1m
    rules:
      # ----- 電表 ingest 停滯 -----
      - uid: ems-pipeline-electricity-stale
        title: "電表資料寫入停滯 (>2 分鐘無新資料)"
        condition: C
        data:
          # A: 查過去 2 分鐘有幾筆 electricity_measurements
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT
                  COUNT(*)::float8 AS row_count
                FROM electricity_measurements
                WHERE time > now() - interval '2 minutes'
              refId: A
          # B: Reduce → last value
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          # C: Threshold → row_count < 1 就告警
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: Alerting    # 沒資料 = 真的壞了，要告警
        execErrState: Alerting   # SQL 錯誤 = 真的壞了，要告警
        for: 1m
        labels:
          severity: critical
          component: pipeline
        annotations:
          summary: "電表資料寫入停滯"
          description: "過去 2 分鐘沒有新的 electricity_measurements 寫入。請檢查 ems-simulator / ems-gateway / ems-ingest / mosquitto / timescaledb"
        isPaused: false
        notification_settings:
          receiver: Telegram

      # ----- 工廠 ingest 停滯 -----
      - uid: ems-pipeline-factory-stale
        title: "工廠資料寫入停滯 (>2 分鐘無新資料)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT
                  COUNT(*)::float8 AS row_count
                FROM factory_measurements
                WHERE time > now() - interval '2 minutes'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        labels:
          severity: critical
          component: pipeline
        annotations:
          summary: "工廠資料寫入停滯"
          description: "過去 2 分鐘沒有新的 factory_measurements 寫入。請檢查 kc-modbus-sim / kc-mqtt-sim / kc-gateway / kc-ingest / mosquitto / timescaledb"
        isPaused: false
        notification_settings:
          receiver: Telegram

  # ============================================================
  # Group 3: 設備分類安全告警 (PRD-0003 device_audit_log)
  # 來源 = device_audit_log rows (audit Slice A-C2)。低基數設計：用 SQL
  # GROUP BY ... HAVING 算出「跨閾值的 device/key 數量」當單一指標，device_id /
  # actor_key_id 不進 Prometheus label。
  # FR-339 語意：採「1h 內同 device BLOCK count >= 5」的 WINDOW-COUNT（爆量），
  #   非嚴格 consecutive；對齊 PRD 驗收「6 次 injection -> 第 5 次後 alert」。嚴格
  #   consecutive 若有需求須走 ADR。
  # 測試隔離：device_id LIKE 'itest-%' 為整合測試裝置（共享 dev DB），一律從告警
  #   查詢排除，避免測試在 append-only audit table 累積的 rows 誤觸告警（prod 無此前綴）。
  # noData/execErr：noData=OK（無 audit row 不誤觸）；execErr=Error（壞查詢進 Error
  #   狀態通知，不靜默失效）— 見各 rule。
  # ============================================================
  - orgId: 1
    name: EMS-設備分類安全
    folder: EMS
    interval: 1m
    rules:
      # ----- FR-339：L2 guardrail 連續 BLOCK 同 device / 1h ≥ 5 -----
      - uid: ems-guardrail-block-burst
        title: "L2 guardrail BLOCK 爆量 (同 device 1h ≥ 5 次)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS offending_devices FROM (
                  SELECT device_id
                  FROM public.device_audit_log
                  WHERE event_type = 'guardrail_block'
                    AND event_time > now() - interval '1 hour'
                    AND device_id NOT LIKE 'itest-%'   -- exclude integration-test devices (shared dev DB)
                  GROUP BY device_id
                  HAVING count(*) >= 5
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        # 安全告警：查詢執行失敗時進 Error 狀態（會通知），避免壞查詢靜默失效；
        # 空表/平靜期則維持 OK（沒有 audit row 不該誤觸）。
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          component: device-classification
        annotations:
          summary: "L2 guardrail 連續 BLOCK (FR-339)"
          description: "過去 1 小時內有 device 的 L2 guardrail BLOCK ≥ 5 次，可能正被持續 prompt-injection 攻擊。查 SELECT device_id, count(*) FROM device_audit_log WHERE event_type='guardrail_block' AND event_time>now()-interval '1 hour' GROUP BY device_id HAVING count(*)>=5。"
        isPaused: false
        notification_settings:
          receiver: Telegram

      # ----- FR-344：大量 deactivate 同 key / 1h ≥ 5 -----
      - uid: ems-mass-deactivate-1h
        title: "大量 deactivate (同 key 1h ≥ 5)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS offending_keys FROM (
                  SELECT actor_key_id
                  FROM public.device_audit_log
                  WHERE event_type = 'deactivate'
                    AND actor_key_id IS NOT NULL
                    AND event_time > now() - interval '1 hour'
                    AND device_id IS NOT NULL AND device_id NOT LIKE 'itest-%'  -- exclude test rows
                  GROUP BY actor_key_id
                  HAVING count(*) >= 5
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        # 安全告警：查詢執行失敗時進 Error 狀態（會通知），避免壞查詢靜默失效；
        # 空表/平靜期則維持 OK（沒有 audit row 不該誤觸）。
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          component: device-corrections
        annotations:
          summary: "大量 deactivate / 1h (FR-344)"
          description: "過去 1 小時內有 OPS key 將 ≥ 5 筆 corrections 標為 deactivate，可能是 correction 毒化/竄改。查 device_audit_log event_type='deactivate' GROUP BY actor_key_id。"
        isPaused: false
        notification_settings:
          receiver: Telegram

      # ----- FR-344：大量 deactivate 同 key / 24h ≥ 20 -----
      - uid: ems-mass-deactivate-24h
        title: "大量 deactivate (同 key 24h ≥ 20)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS offending_keys FROM (
                  SELECT actor_key_id
                  FROM public.device_audit_log
                  WHERE event_type = 'deactivate'
                    AND actor_key_id IS NOT NULL
                    AND event_time > now() - interval '24 hours'
                    AND device_id IS NOT NULL AND device_id NOT LIKE 'itest-%'  -- exclude test rows
                  GROUP BY actor_key_id
                  HAVING count(*) >= 20
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        # 安全告警：查詢執行失敗時進 Error 狀態（會通知），避免壞查詢靜默失效；
        # 空表/平靜期則維持 OK（沒有 audit row 不該誤觸）。
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          component: device-corrections
        annotations:
          summary: "大量 deactivate / 24h (FR-344)"
          description: "過去 24 小時內有 OPS key 將 ≥ 20 筆 corrections 標為 deactivate。查 device_audit_log event_type='deactivate' GROUP BY actor_key_id。"
        isPaused: false
        notification_settings:
          receiver: Telegram

  # ============================================================
  # Group 3: EMS-預算告警 (PRD-0004 FR-400~405)
  #   比例分母一律取 ledger row 自身的 budget_usd（cost_usd/budget_usd），
  #   非 env 常數 —— FR-334 /admin/budget/extend 會就地調高 budget_usd，
  #   用 env 常數會在加額度後算錯門檻（PRD-0004 §4 / FR-400~402）。
  #   當期 row 以 now() ∈ [period_start, period_end) 選取（UNIQUE(period_start,provider) 保證唯一）。
  #   刻意不加 active=TRUE：budget_reserve/settle（gate）選取也不看 active，告警須與 gate 同條件，
  #   否則未來若有 rollover 把舊 row 設 active=FALSE，會在換期間隙誤判 noData→OK 而靜默漏報。
  #   低基數：SQL 取「跨閾值的 provider 數」單一 scalar，provider/金額不進 label (FR-403)。
  #   warn=[0.8,1.0) 與 exhausted=[1.0,∞) 為互斥區間，同點僅一條成立 (FR-401)。
  #   warn 用 for=5m 去抖（cost 當期單調遞增）；exhausted 用 for=0s 即報 (FR-404)。
  #   注意：0.8 = BUDGET_WARN_RATIO 預設，Grafana SQL 無法讀 env 故硬編；改 env 須同步此處。
  #   注意：shared dev DB 上整合測試會暫時觸碰這些 row 但會 restore（非生產問題）。
  # ============================================================
  - orgId: 1
    name: EMS-預算告警
    folder: EMS
    interval: 1m
    rules:
      # ----- FR-400：L1 (非 guardrail) 月預算 warn 80%~<100% -----
      - uid: ems-l1-budget-warn
        title: "L1 LLM 月預算達 80% (warn)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS over_warn FROM (
                  SELECT provider
                  FROM public.llm_budget_ledger
                  WHERE provider <> 'guardrail'
                    AND period_start <= now() AND period_end > now()
                    AND budget_usd > 0
                    AND cost_usd / budget_usd >= 0.8
                    AND cost_usd / budget_usd < 1.0
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          component: llm-budget
        annotations:
          summary: "L1 LLM 月預算達 80% (FR-400)"
          description: "L1 分類 LLM 當期花費已達月預算 80%~<100%。請評估加額度或切 mock。查 SELECT provider, cost_usd, budget_usd, round(cost_usd/budget_usd*100) AS pct FROM llm_budget_ledger WHERE provider<>'guardrail' AND period_start<=now() AND period_end>now()。"
        isPaused: false
        notification_settings:
          receiver: Telegram

      # ----- FR-401：L1 月預算 100% exhausted (fail-closed 降級) -----
      - uid: ems-l1-budget-exhausted
        title: "L1 LLM 月預算 100% (exhausted, fail-closed)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS over_cap FROM (
                  SELECT provider
                  FROM public.llm_budget_ledger
                  WHERE provider <> 'guardrail'
                    AND period_start <= now() AND period_end > now()
                    AND budget_usd > 0
                    AND cost_usd / budget_usd >= 1.0
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: critical
          component: llm-budget
        annotations:
          summary: "L1 LLM 月預算 100% — 分類已 fail-closed 降級 (FR-401)"
          description: "L1 當期花費達月預算 100%，分類已 fail-closed 降級為 system_fallback（改用預設值，AI 分類停用）。請立即加額度或切 mock。"
        isPaused: false
        notification_settings:
          receiver: Telegram

      # ----- FR-402：guardrail (L2) 月預算 warn 80%~<100% -----
      - uid: ems-guardrail-budget-warn
        title: "L2 guardrail 月預算達 80% (warn)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS over_warn FROM (
                  SELECT provider
                  FROM public.llm_budget_ledger
                  WHERE provider = 'guardrail'
                    AND period_start <= now() AND period_end > now()
                    AND budget_usd > 0
                    AND cost_usd / budget_usd >= 0.8
                    AND cost_usd / budget_usd < 1.0
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          component: guardrail-budget
        annotations:
          summary: "L2 guardrail 月預算達 80% (FR-402)"
          description: "L2 guardrail (provider='guardrail') 當期花費達月預算 80%~<100%。達 100% 時連 L1 一起停（分類全停走 fallback）。請評估加額度。"
        isPaused: false
        notification_settings:
          receiver: Telegram

      # ----- FR-402：guardrail (L2) 月預算 100% exhausted (連 L1 一起停) -----
      - uid: ems-guardrail-budget-exhausted
        title: "L2 guardrail 月預算 100% (exhausted, 連 L1 全停)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb-ems
            model:
              editorMode: code
              format: table
              rawQuery: true
              rawSql: |
                SELECT count(*)::float8 AS over_cap FROM (
                  SELECT provider
                  FROM public.llm_budget_ledger
                  WHERE provider = 'guardrail'
                    AND period_start <= now() AND period_end > now()
                    AND budget_usd > 0
                    AND cost_usd / budget_usd >= 1.0
                ) t
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                name: Expression
                type: __expr__
                uid: "-100"
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: critical
          component: guardrail-budget
        annotations:
          summary: "L2 guardrail 月預算 100% — 分類全停 fail-closed (FR-402)"
          description: "L2 guardrail 當期花費達月預算 100%，依 FR-340 fail-closed：分類全停（連 L1）走 system_fallback。請立即加額度或將 guardrail 切回 mock。"
        isPaused: false
        notification_settings:
          receiver: Telegram
