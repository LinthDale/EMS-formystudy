#   MQTT payload 上限 16KB(FR-323)、欄位上限 64(FR-324/328)、樣本上限 20(FR-328)、
#   reasoning 上限 500(FR-333)、device_id/signal_name regex(FR-322)
# 不在本檔（機密，放 .env）：DB_*_PASSWORD、*_API_KEY、LLM_API_KEY
# -----------------------------------------------------------------------------